# residential.yaml
# ----------------
# Tipologías de departamentos residenciales para el BIM Generator.
# Cada tipología define la composición de ambientes con superficies y
# dimensiones de referencia. Estas son las plantillas por defecto;
# el usuario puede modificarlas desde el panel de Tipologías.
#
# Formato:
#   id: identificador único (debe coincidir con TipoUnidad enum)
#   nombre: nombre visible en la UI
#   ambientes: lista de ambientes con tipo, superficie y ancho mínimo
#   superficie_total_ref_m2: referencia para la ficha técnica

tipologias:

  - id: monoambiente
    nombre: "Monoambiente"
    descripcion: "Unidad compacta de un solo ambiente integrado."
    superficie_total_ref_m2: 32.0
    ambientes:
      - tipo: living_comedor
        superficie_m2: 18.0
        ancho_min_m: 3.5
        iluminacion_natural: true
        ventilacion_natural: true
